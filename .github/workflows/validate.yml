name: validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  governance:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Check repository governance contract
        run: tests/governance.sh

  render:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install OpenSCAD 2021.01
        run: |
          sudo apt-get update
          sudo apt-get install --yes openscad
          openscad --version 2>&1 | grep '2021.01'
      - name: Render governed examples
        run: tests/render_examples.sh
      - name: Test array API sizing branches
        run: tests/array_acceptance.sh
      - name: Test Lamp presets
        run: tests/lamp_acceptance.sh
      - name: Test assembly template
        run: templates/assembly/acceptance.sh
      - name: Test operation SVG exports
        run: tests/export_acceptance.sh
      - name: Run Bob acceptance renders
        run: tests/bob_acceptance.sh
